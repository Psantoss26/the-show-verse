<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      background-color: #0b0b0c;
      color: #e4e4e7;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding-bottom: 12px;
      margin-bottom: 14px;
    }
    .logo {
      height: 24px;
      width: auto;
    }
    .title {
      font-weight: 800;
      font-size: 15px;
      color: #ffffff;
      letter-spacing: -0.3px;
    }
    .status-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 600;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    .dot-green {
      background-color: #10b981;
      box-shadow: 0 0 8px #10b981;
    }
    .dot-red {
      background-color: #ef4444;
      box-shadow: 0 0 8px #ef4444;
    }
    .dot-orange {
      background-color: #f59e0b;
      box-shadow: 0 0 8px #f59e0b;
    }
    .user-info {
      font-size: 12px;
      color: #a1a1aa;
      line-height: 1.4;
    }
    .user-email {
      font-weight: bold;
      color: #e4e4e7;
    }
    .footer {
      margin-top: 14px;
      text-align: center;
      font-size: 11px;
      color: #71717a;
    }
    .btn {
      display: block;
      width: 100%;
      box-sizing: border-box;
      text-align: center;
      padding: 8px 12px;
      background: #e50914;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      font-size: 12px;
      margin-top: 8px;
    }
    .btn:hover {
      background: #b20710;
    }
    .btn-secondary {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: #f4f4f5;
    }
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.14);
    }
    .btn-paused {
      background: #10b981;
      color: #04130d;
    }
    .btn-paused:hover {
      background: #34d399;
    }
    .logs-container {
      margin-top: 12px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 10px;
      padding: 10px;
    }
    .logs-header {
      font-size: 11px;
      font-weight: 700;
      color: #a1a1aa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 6px;
      margin-bottom: 6px;
    }
    .logs-list {
      font-size: 11px;
      color: #a1a1aa;
      max-height: 110px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .log-item {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      line-height: 1.3;
    }
    .log-message {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }
    .log-time {
      color: #52525b;
      flex-shrink: 0;
    }
    /* Scrollbar styling */
    .logs-list::-webkit-scrollbar {
      width: 4px;
    }
    .logs-list::-webkit-scrollbar-track {
      background: transparent;
    }
    .logs-list::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icon.png" class="logo" alt="Logo">
    <div class="title">The Show Verse - Streaming Sync</div>
  </div>

  <div class="status-card">
    <div id="status-row" class="status-row">
      <span id="status-dot" class="dot dot-orange"></span>
      <span id="status-text">Comprobando sesión...</span>
    </div>
    <div id="user-info" class="user-info" style="display: none;">
      Cuenta vinculada: <span id="user-email" class="user-email">...</span>
    </div>
    <a href="#" id="action-btn" class="btn" style="display: none;">Configuración</a>
    <button type="button" id="pause-btn" class="btn btn-secondary" style="display: none;">
      Pausar sincronización
    </button>
  </div>

  <div class="logs-container">
    <div class="logs-header">Actividad Reciente</div>
    <div id="logs-list" class="logs-list">
      <span style="color:#52525b; font-style:italic;">No hay actividad registrada.</span>
    </div>
  </div>

  <div class="footer">
    The Show Verse &copy; 2026
  </div>

  <script src="popup.js"></script>
</body>
</html>
