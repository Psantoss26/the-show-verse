version: '3.9'

services:
  # ─────────────────────────────────────────────
  # API Backend
  # ─────────────────────────────────────────────
  api:
    build: .
    container_name: tsv-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://tsv_user:${POSTGRES_PASSWORD}@db:5432/the_show_verse
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      TMDB_API_KEY: ${TMDB_API_KEY}
      TRAKT_CLIENT_ID: ${TRAKT_CLIENT_ID}
      TRAKT_CLIENT_SECRET: ${TRAKT_CLIENT_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tsv-network

  # ─────────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: tsv-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: the_show_verse
      POSTGRES_USER: tsv_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"   # Quitar en producción para no exponer la BD
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tsv_user -d the_show_verse"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tsv-network

  # ─────────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tsv-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"   # Quitar en producción
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - tsv-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  tsv-network:
    driver: bridge
