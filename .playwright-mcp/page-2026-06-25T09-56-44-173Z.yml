              - paragraph [ref=e751]: Luffy se dirige hacia Marine Ford, la sede de la Marina, la escena cambia hace unos días atrás, Nami esta todavía en la isla del clima, que lentamente se dirige hacia el archipiélago Sabaody a un ritmo determinado por los vientos. Ella ve al viejo, demostrando su capacidad de convocar grandes lluvias y tormentas eléctricas. Mientras tanto, Franky sigue actuando como un caballero bajo los efectos del té, y el niño que esta con él se pregunta cuándo llegará la cola para devolverlo a la normalidad. Franky es atacado por varios cyborgs en el bosque, haciendo que el té haga burbujas y vuelva a la normalidad, que le permite derrotar a los cyborgs con facilidad. Franky se entera de que el Dr. Vegapunk, hizo los cyborgs, y llega a una casa con el nombre de Vegapunk en él, lo que provocó una alarma.
