        - link "Comienza la operación de exterminio. El poder del ejército Pacifista Episodio 471 Comienza la operación de exterminio. El poder del ejército Pacifista 17 oct 2010 24 min Los Pacifistas, derrotan a los Piratas de Barbablanca en su camino, pero el plan no es totalmente eficaz, debido a que Barba Blanca ataca a los buques. Los infantes de marina se retiran de la plaza, con la intención de elevar el muro de fortificación y ejecutar a Ace antes de terminar con los Piratas de Barbablanca y Luffy, y los comandantes de Barbablanca se apresuran para llegar a Ace. Las órdenes de Sengoku son aplicadas y todos los Den Den Mushi dejan de emitir, pero el que robo Buggy todavía sigue transmitiendo imágenes. Squardo, uno de los aliados de Barba Blanca que había estado ausente por algún tiempo, apuñala a Barba Blanca en el pecho con su espada." [ref=e1058] [cursor=pointer]:
