              - paragraph [ref=e1003]: Luffy sigue para salvar a Ace, luchando contra los infantes de marina en el camino. Kizaru lo ataca con un rayo de luz, pero Ivankov lo salva, sólo para ser atacado por Kuma, quien afirma conocer. Luffy se encuentra con Jango y Fullbody; Jango accidentalmente se hipnotiza a sí mismo y a Fullbody, y se escapa de Hina con el Gear Second. En otras partes, los Piratas de Barbablanca tienen dificultades para derrotar a los Vice-almirantes, y Squardo intenta colarse, sólo para encontrarse con alguien. Moria ataca con un grupo de zombies, mientras tanto Ace le grita a Luffy que no soportaría ser salvado por un débil, mientras que en realidad no quiere que Luffy muera. Sin embargo, Luffy le dice que no le importa, y decide salvarlo aunque muera. Jimbei llega, derrotando a los zombis de Moria con un chorro de agua salada, y Luffy derrota a un oficial gigante con el Gear Third, Sengoku revela a los infantes de marina que Luffy es el hijo de Dragón el Revolucionario.
