              - paragraph [ref=e265]: En un flashback, se revela que hace 20 años, un pirata llamado Shiki se cortó las piernas y se escapó de Impel Down. Shiki contacto a los Piratas Amigo, una tripulación de piratas liderados por un hombre llamado Largo, que ofrecen pertenecer a su tripulación si cumplen con una solicitud determinada. Mientras tanto, Luffy, Usopp, Chopper y Brook tratar de atrapar un gran pez, pero termina siendo devorado por un gran escarabajo llamado "Jefe". Luffy comienza la lucha contra el escarabajo con la intención de hacerlo parte de su tripulación, pero vuela hacia una isla con él, Zoro, Sanji y Usopp en el remolque. Yoko, una chica que llevaba un abrigo de la Marina aparece, atacando a Luffy sobre cómo trató a “Jefe”, y algunas personas salen y revelan que han estado viviendo bajo muchas amenazas, porque los marines no los protegen. El padre de Yoko fue un infante de marina que murió defendiéndolos hace cinco años, y que “Jefe” se reunió por primera vez en la isla hace tres años después de su muerte. Se muestran a los cuatro Sombreros de Paja en un pueblo, que se parece mucho al East Blue hasta el punto de tener réplicas de varios edificios importantes. La misión de Largo y sus piratas es secuestrar al escarabajo que salió de su escondite.
        - link "Especial relacionado con la película. Amenazan al pequeño East Blue Episodio 427 Especial relacionado con la película. Amenazan al pequeño East Blue 22 nov 2009 24 min Los Sombrero de Paja se reúnen con personas en lugares que les recuerdan de dónde vinieron, y Yoko se irrita cuando lo vinculan tan fácilmente. Los Piratas Amigo deciden ir a tierra, pero debido a Largo, está tomando una siesta, Colt los lleva. Nami se reúne con el club \"Orenami\", que la conduce a través de un laberinto y le muestra una estatua desnuda de ella, que la ofende. Ella ve a Yoko, y considera que Yoko le recuerda a sí misma cuando ella conoció a Luffy. Mientras que los sombreros de paja en una fiesta pelean contra los piratas Amigo, destruyendo gran parte del pueblo, y la demanda del escarabajo. Luffy derrota fácilmente a Colt y a sus hombres con la ayuda de Zoro y Sanji." [ref=e266] [cursor=pointer]:
          - /url: /details/tv/37854/season/13/episode/427
