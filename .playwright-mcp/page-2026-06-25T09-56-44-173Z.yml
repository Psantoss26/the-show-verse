        - link "¡Un Shichibukai en la prisión! ¡Jimbei el primer hijo del mar! Episodio 430 ¡Un Shichibukai en la prisión! ¡Jimbei el primer hijo del mar! 13 dic 2009 24 min Ace habla ,en la celda, con Gyojin llamado Jimbei que pertenece a la Ouka Shichibukai y se entera de que Jimbei había querido detener la guerra entre los piratas de Barba Blanca y la Infantería de Marina, porque Barbablanca protege la isla Gyojin de los piratas que pasan a través de ella . Varios piratas en el nivel, incluyendo Crocodile, quieren a Barbablanca muerto por frustrar sus ambiciones. En el Nivel 2, Luffy, Buggy y Mr. 3 se encuentran con la Esfinge, que es el jefe del nivel. Mr. 3 escapa con Buggy a un nivel más alto mientras que usan a Luffy como cebo. Pero la Esfinge destruye el suelo, Luffy, Buggy y Mr. 3 caen al nivel 3." [ref=e320] [cursor=pointer]:
