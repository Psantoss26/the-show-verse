        - link "Llega el equipo Sombrero de Paja. La tensión crece en el campo de batalla Episodio 466 Llega el equipo Sombrero de Paja. La tensión crece en el campo de batalla 12 sept 2010 24 min En un flashback, el tsunami creado por Barbablanca precipita al buque de Luffy. Tratan de subirse a la ola, pero se quedan bloqueados en la parte superior cuando Aokiji lo congela. Después de escuchar un informe de que la ejecución va a suceder pronto, en un intento de liberarse, caen. Luffy ve que Ace está vivo, entonces detiene a Crocodile que intenta atacar a Barbablanca. Luffy le avisa a Barbablanca que la ejecución será pronto y este le pregunta sobre el sombrero, Luffy dice que es de Shanks, y le advierte a Barba Blanca que él va a rescatar a Ace y que él va a convertirse en Rey de los Piratas." [ref=e968] [cursor=pointer]:
