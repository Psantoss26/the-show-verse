        - link "Especial relacionado con la película. ¡Batalla decisiva! Luffy vs Largo Episodio 429 Especial relacionado con la película. ¡Batalla decisiva! Luffy vs Largo 06 dic 2009 24 min Después de la evitación de la red, Luffy golpea Largo a lo lejos, Nami pretende evacuar a los aldeanos, pero toman otros túneles para sorprender a los piratas de Amigo. Luffy lucha contra Largo, pero queda atrapado cuando él convierte su cuerpo entero en una red. Luffy usa third geard y derrota a largo, además destruye su barco en el proceso. El jefe salva a Luffy de caerse al mar y luego comienza a luchar. Yoko y Nami hablan de sus pasados, antes de que Nami se encuentre con los Sombreros De paja. Es revelado que el Jefe era un insecto sobre todo creado, que se había escapado de Shiki, y que él planifica su utilización para una guerra." [ref=e302] [cursor=pointer]:
