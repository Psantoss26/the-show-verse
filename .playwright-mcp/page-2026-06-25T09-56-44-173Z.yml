              - paragraph [ref=e355]: Sin la Esfinge custodiando, un motín estalla en el Nivel 2, los prisioneros salen de sus celdas. Sengoku está indignado por Luffy, señalando que nadie ha escapado de Impel Down desde Shiki hace 20 años. Luffy, Buggy y Mr. 3 pasean por el tercer nivel, un desierto caliente en la que los presos no reciben agua ni comida, hasta que se ven atrapados en una red provocada por Saldeath, comandante de los guardias. La esfinge lucha y rompe la red, y mientras Buggy y Mr. 3 abandonan a Luffy mientras luchan contra los guardias, que no pueden salir del nivel. Mientras tanto, Hancock se acerca a donde esta Ace, se muestra que Mr. 2 esta encarcelado en el Nivel 3.
        - link "¡El cisne esta libre! ¡Una reunión con Bon Clay! Episodio 432 ¡El cisne esta libre! ¡Una reunión con Bon Clay! 27 dic 2009 24 min Buggy y Mr. 3 encuentran a Mr. 2 y lo liberan, diciéndole que Luffy se encuentra en la cárcel, y quiere llegar al nivel 5. Mientras tanto, la marina llega a Impel Down para ayudar en la captura de Luffy. El capitán de los guardias, Sadie, a fin de prevenir el exterior de la prisión, como los guardias de Impel Down son perfectamente capaces de capturar a Luffy por sí mismos. Boa Hancock llega a la celda de Ace, y se las arregla para informarle de que Luffy esta viniendo para rescatarle, mientras que Magellan y los demás están ocupados con otros presos. Como Luffy se acerca a las escaleras que conducen al nivel 4, es atacado por Saldeath y sus guardias, pero recibe ayuda inesperada de Mr. 2, que ha decidido ayudarle en su búsqueda." [ref=e356] [cursor=pointer]:
