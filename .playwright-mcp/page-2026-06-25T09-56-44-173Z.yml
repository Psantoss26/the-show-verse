        - link "¡¿Una reunión en el infierno?! ¡El hombre que comió la Bara Bara No Mi! Episodio 423 ¡¿Una reunión en el infierno?! ¡El hombre que comió la Bara Bara No Mi! 25 oct 2009 24 min Hancock petrifica a Domino y al caracol de la cámara para permitir a Luffy salir a escondidas. Ella sube al ascensor para presentarse con Magellan, el jefe de la prisión en el nivel 4. Luffy se cuela en el nivel 1, mientras que Buggy esta por salir de su celda, por haber ocultado su habilidad de dividirse, Buggy alerta a algunos guardias y activa algunas trampas en su fuga, pero Luffy se las arregla para evadirlas y oye el rumor de que Ace esta en el nivel 5. Buggy corre, perseguido por los poderosos Blugori, y después de algunas disputas entre él y Luffy, deciden unirse para luchar contra los enemigos." [ref=e194] [cursor=pointer]:
