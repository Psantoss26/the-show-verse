              - paragraph [ref=e877]: "Mientras que los infantes de marina están a la espera del asalto de Barba Blanca y la ejecución de Ace, Garp tiene un flashback: meses antes de que Gold Roger fue ejecutado, reveló a Garp que va a tener un hijo y le dijo a Garp que lo cuide. Los infantes de marina han buscado a gente que estén conectados con Roger. Portgas D. Rouge, la madre de Ace, mantiene al niño dentro de su vientre durante 20 meses. Sin embargo, después Rouge dio a luz al niño, un niño al que llamó Gol D. Ace y murió de agotamiento. Ace fue mandado por Garp con Dadan poco después. Garp también introdujo a Luffy a la vida de Ace y se hicieron amigos. Durante el discurso de la ejecución de Sengoku, él se entera de que las puertas de Justicia se han abierto sin una orden, lo que permite al barco de Luffy pasar. Después la flota de Barbablanca aparece, el Moby Dick aparece bajo el agua frente a la plataforma de ejecución."
