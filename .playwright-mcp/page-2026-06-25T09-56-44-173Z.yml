              - paragraph [ref=e895]: "Barba Blanca revela su poder de Akuma No Mi frente a la Marina. Entramos en el pasado de Ace y Barbablanca: Ace fue el capitán de los Piratas de Spade. Ace se enfrenta a Jimbei para satisfacer a Barbablanca desde el rechazo de Ace a una oferta para convertirse en un Shichibukai. BarbaBlanca ofreció a Ace unirse a su tripulación cuando la batalla termino, Ace intentó matar a Barbablanca en vano. Barbablanca nombra a Ace comandante de la 2da división. Sin embargo, cuando Barbanegra deserto de la tripulación y asesino a un nakama, Ace dejó a Barbiblanca para capturar a Barbanegra. Cuando Ace le dice a BarbaBlanca en la plataforma de ejecución que hizo caso omiso a sus consejos, BarbaBlanca dice que él fue quien lo envió, cuando en realidad le dijo que no fuera, para que el rescate fuese justificado."
        - link "¡Un poder capaz de destruir el mundo! La habilidad de la Gura Gura no Mi Episodio 462 ¡Un poder capaz de destruir el mundo! La habilidad de la Gura Gura no Mi 15 ago 2010 24 min BarbaBlanca y sus aliados declaran a los infantes de marina su determinación de rescatar a Ace, mientras que Luffy y su grupo están llegando a Marineford. Un tsunami se acerca a Marineford en ambos lados como resultado de la Gura Gura No Mi. Sin embargo, Aokiji lo detiene con su habilidad, mediante la congelación. La división de comandantes de Barbablanca entran en acción, al igual que los Vice-Almirantes. Mihawk a continuación, lanza un gran ataque hacia Barbablanca." [ref=e896] [cursor=pointer]:
