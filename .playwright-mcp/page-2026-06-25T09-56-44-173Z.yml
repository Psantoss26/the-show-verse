              - paragraph [ref=e247]: Luffy y Buggy se encuentran en el piso de las bestias salvajes del infierno y combaten a los monstruos. Luffy derrota al basilisco de gran alcance con un solo puñetazo usando el geard third, destruyendo un puesto de guardia en el proceso y alertando a la prisión. Hancock se reúne con Magellan, el jefe de la prisión que comió La Doku Doku no mi. Buggy logra liberar a algunos presos, con la esperanza de iniciar un motín y escapar en la confusión, pero el retorno de los prisioneros a sus celdas, aterrorizados por el "jefe" del nivel. Luffy y Buggy se encuentran con Mr. 3, que se ofrece a ayudarles a llegar hasta el tercer nivel. En la Sede de la Marina, Sengoku se sorprende de saber que Kuma no acabo con Luffy, y que Luffy esta infiltrado en Impel Down, pero confía en que será capturado. Sengoku recuerda al hombre que escapó de Impel Down, León de Oro Shiki.
        - link [ref=e248] [cursor=pointer]:
