              - paragraph [ref=e1111]: En un desesperado intento de detener el avance de Barbablanca, los infantes de marina activan las paredes para bloquearle el camino, pero se detuvo por el hielo. Squardo se da cuenta de su error en el apuñalamiento de Barbablanca y llora, pero Marco lo calma. Mientras tanto, Luffy y sus aliados se acercan a la plataforma de ejecución y la Marina no puede pararlos. Barbablanca se enfrenta a John el gigante, y lo derrota con un golpe en el pecho. Luffy estira sus brazos para alcanzar a Ace, pero los marines activan las paredes y Luffy cae. Sin embargo, queda un camino libre en el que Oars jr. cayo herido y impide que el muro se levante. Akainu utiliza su ataque Meteoro Volcán para derretir el hielo en un intento de evitar que los piratas de Barbablanca alcancen a Ace.
        - link "Se ha dado la orden de ejecución. ¡Atravesar el Muro de contención! Episodio 474 Se ha dado la orden de ejecución. ¡Atravesar el Muro de contención! 07 nov 2010 24 min El ataque de Akainu derrite casi todo el hielo y destruye los barcos de Barbablanca, colocándolos en agua hirviendo, lo que les permite a los cañones bombardear, mientras que los Pacifistas bloquean la salida. El hueco dejado abierto por Oars Jr. es vulnerable, Luffy y algunos Piratas de Barbablanca tratan de romperlo, pero son obligados a regresar. Sengoku se prepara para ejecutar ahora a Ace. Ya que los Piratas de Barbablanca no pueden salvarlo o escapar, pero Oars recupera la conciencia. Jimbei lanza a Luffy por encima del muro, y Luffy comienza a luchar contra los tres almirantes, como Barbablanca decide jugar su carta de triunfo." [ref=e1112] [cursor=pointer]:
