        - link "¡Atravesar el infierno carmesí! ¡El plan de inducción al caos de Buggy! Episodio 424 ¡Atravesar el infierno carmesí! ¡El plan de inducción al caos de Buggy! 01 nov 2009 24 min Luffy derrota fácilmente al Blugori mientras Buggy es incapaz de derrotar a uno. Buggy revela su pasada asociación con Ace y las circunstancias detrás de su captura, y se compromete a trabajar con Luffy a cambio del brazalete que recibió en Thriller Bark, que es una pista de un tesoro. Buggy y Luffy llegan al primer nivel de Impel Down, conocido como el Infierno Carmesí, donde los prisioneros son obligados a correr a través de un bosque. Luffy y Buggy caen al segundo nivel, el nivel de las bestias salvajes del infierno, donde se encuentra Mr. 3." [ref=e212] [cursor=pointer]:
