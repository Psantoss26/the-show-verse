        - link "La trampa del carcelero jefe Saldeath. Nivel 3, el infierno del hambre Episodio 431 La trampa del carcelero jefe Saldeath. Nivel 3, el infierno del hambre 20 dic 2009 24 min Sin la Esfinge custodiando, un motín estalla en el Nivel 2, los prisioneros salen de sus celdas. Sengoku está indignado por Luffy, señalando que nadie ha escapado de Impel Down desde Shiki hace 20 años. Luffy, Buggy y Mr. 3 pasean por el tercer nivel, un desierto caliente en la que los presos no reciben agua ni comida, hasta que se ven atrapados en una red provocada por Saldeath, comandante de los guardias. La esfinge lucha y rompe la red, y mientras Buggy y Mr. 3 abandonan a Luffy mientras luchan contra los guardias, que no pueden salir del nivel. Mientras tanto, Hancock se acerca a donde esta Ace, se muestra que Mr. 2 esta encarcelado en el Nivel 3." [ref=e338] [cursor=pointer]:
