        - link "Especial de la película. El ataque de los piratas amigos Episodio 428 Especial de la película. El ataque de los piratas amigos 29 nov 2009 24 min Zoro y Sanji intentan atacar a Largo, que utiliza su Ami-Ami para crear redes a partir de materiales que se come y los captura. Largo y Colt amenazan con exterminar la ciudad si no obtienen el escarabajo, y “Jefe” sale a luchar contra ellos, pero es derrotado rápidamente. “Jefe” decide sacrificarse para salvar al pueblo, pese a las objeciones de Yoko, pero las lágrimas de Luffy abren la red y golpea a “jefe”, diciendo que él quiere pelear con él de nuevo. “Jefe” es capaz de volar el tiempo suficiente para quemar la red en donde están Luffy, Zoro y Sanji. Los Sombrero de Paja y los habitantes se preparan para luchar contra los Piratas de Amigo." [ref=e284] [cursor=pointer]:
