        - link "¡Por su amigo! ¡Bon Clay va al Rescate! Episodio 437 ¡Por su amigo! ¡Bon Clay va al Rescate! 07 feb 2010 24 min Después de la derrota de Luffy, Magellan lo encarcela en el nivel 5 hasta que el veneno lo mate. Mr. 2, habiendo tomado la apariencia de Hannybal, decide rescatar a Luffy con el fin de compensar el abandono en la lucha contra Magellan, pero se entera de que hay antídotos que pueden salvarlo ahora. Mr. 2 decide entonces buscar a Emporio Ivankov, Reina de Kamabakka, para curar a Luffy, pero se entera de que ha desaparecido en uno de los incidentes. Mr.2 va al nivel 5 con Buggy y Mr. 3, quienes rápidamente lo abandonan cuando la unidad de lobos los ataca. Luffy sigue decidido a rescatar a Ace a pesar de su condición, y Mr. 2 llega a su celda para salvarlo." [ref=e446] [cursor=pointer]:
