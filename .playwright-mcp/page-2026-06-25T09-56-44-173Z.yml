        - link "¡Una infiltración mortal! ¡La prisión submarina Impel Down! Episodio 422 ¡Una infiltración mortal! ¡La prisión submarina Impel Down! 18 oct 2009 24 min Garp le dice a Ace que Luffy sabe ahora acerca de su padre y que él había esperado que Ace y Luffy se convertirían en infantes de marina. Ace dice que es imposible, porque tanto él como Luffy son descendientes de criminales, y que como él niega a su padre, tomó el apellido de su madre y considera solamente a Barbablanca como su padre. Los Piratas de Buggy navegan hacia Impel Down, con la esperanza de liberar a Buggy. Alvida se niega y sugiere que Impel Down es impenetrable, y el resto de la tripulación se da por vencida después ella dice que va a tomar el barco. Hancock llega a Impel Down con Luffy, donde se reúne con Hannybal, el ambicioso vice-jefe de la prisión, y debe ser sometida a un chequeo al desnudo antes de entrar." [ref=e176] [cursor=pointer]:
