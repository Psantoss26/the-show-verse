              - paragraph [ref=e1021]: Ace esta molesto porque los Piratas de Barbablanca y Luffy todavía están tratando de salvarlo, pero decide aceptar si vive o muere. Barbablanca acepta la ayuda de Buggy, y señaló que a pesar de ser débil, tiene seguidores poderosos que podrían representar una amenaza. Barbablanca, siente que la Marina tiene un plan. Jimbei pelea contra Moria y lo derrota, incluso cuando se roba algunas sombras para aumentar su poder. Smoker ataca a Luffy y lo arrincona, pero Hancock, enojada por el ataque que recibió Luffy, lo ataca y consigue darle una patada a pesar de sus poderes Logia con su Haki. Ivankov es encuentra con Kuma, diciendo que ellos se conocían. Sin embargo, Doflamingo revela a Ivankov que Kuma está muerto.
        - link "Kuma está extraño. El furioso golpe de Iva-san Episodio 469 Kuma está extraño. El furioso golpe de Iva-san 03 oct 2010 24 min Doflamingo le dice a Ivankov que Kuma se ha modificado poco a poco en un Pacifista a lo largo del tiempo y que hace unos días, perdió por completo su personalidad. Luffy recibe la llave de las esposas de Ace de Hancock, quien sueña con una boda celebrada en Amazon Lily entre ella y Luffy con toda la tribu Kuja de testigos. Ivankov lucha contra Kuma, Luffy mientras sigue avanzando por el campo de batalla. Crocodile vence a una multitud de hombres de menor rango de los piratas de Barba Blanca, para llegar a él, pero es detenido por Jozu, pero Crocodile luego se detuvo por Doflamingo. Mihawk se acerca para bloquear el camino de Luffy." [ref=e1022] [cursor=pointer]:
