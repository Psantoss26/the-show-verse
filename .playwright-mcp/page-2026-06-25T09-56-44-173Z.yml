              - paragraph [ref=e1147]: Luffy intenta burlar a los almirantes, pero Kizaru fácilmente lo alcanza y lo golpea contra el suelo. Los verdugos se preparan para ejecutar a Ace, pero interviene Crocodile, diciendo que él puede matar a Barbablanca más tarde y no quiere que los infantes de marina ganen. Aokiji ataca a Luffy, pero Marco lo golpea lejos antes de que pueda acabar con él. Mr. 3 se esconde en los pasajes debajo de Marineford, después de haber logrado escapar de la congelación de Aokiji. Los piratas de Barbablanca se apuran en llegar hacia la abertura en la pared, lo que llevó a las fuerzas de la marina en disparar sus cañones contra ellos, pero Barbablanca había ocultado un barco sumergido y lo saca, Oars agarra el barco y lo impulsa dentro de la plaza con los piratas a bordo. Mientras las fuerzas de Barbablanca llegan a la plaza, Sengoku y Garp se preparan para luchar contra ellos.
        - link "¡Luffy al límite de sus fuerzas! ¡¡Una guerra sin cuartel en la Plaza Oris!! Episodio 476 ¡Luffy al límite de sus fuerzas! ¡¡Una guerra sin cuartel en la Plaza Oris!! 21 nov 2010 24 min Barbablanca ataca a la marina en la plaza, Aokiji viene a pelear con él pero Jozu llega a manejarlo. Luffy es atacado por dos vicealmirantes y Kizaru, a continuación, se derrumba por sus lesiones y cansancio. Barbablanca le dice a Luffy que se mantenga al margen del resto de la batalla, pero admira su persistencia. La batalla continúa, Akainu contra Barbablanca, los piratas aliados llegan para ayudar a los piratas de Barbablanca, y los Pacifistas llegan para luchar contra ellos. Marco vuela para rescatar a Ace, pero Garp lo golpea de nuevo y declara que cualquiera que trate de rescatar a Ace tendrá que matarlo primero." [ref=e1148] [cursor=pointer]:
