name: Deploy to NAS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, nas-showverse]
    timeout-minutes: 30

    steps:
      - name: Checkout código (rama main, último commit)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Mostrar commit desplegado
        run: |
          echo "📦 Commit: $(git rev-parse --short HEAD)"
          echo "📝 Mensaje: $(git log -1 --pretty=%s)"
          echo "🕐 Fecha: $(git log -1 --pretty=%ci)"

      - name: Sincronizar archivos al directorio de la app
        run: |
          which rsync || apt-get install -y rsync -qq
          rsync -a --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.env*' \
            --exclude='*.log' \
            "$GITHUB_WORKSPACE/" /nas-deploy/app/
          echo "✓ Archivos sincronizados: $(git rev-parse --short HEAD)"

      - name: Build imagen Docker desde el código actualizado
        env:
          GH_TMDB_API_KEY: ${{ secrets.TMDB_API_KEY || secrets.NEXT_PUBLIC_TMDB_API_KEY }}
          GH_TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID || secrets.NEXT_PUBLIC_TRAKT_CLIENT_ID }}
        run: |
          docker build \
            --no-cache \
            --build-arg NEXT_PUBLIC_APP_URL="https://theshowverse.com" \
            --build-arg NEXT_PUBLIC_TMDB_API_KEY="$GH_TMDB_API_KEY" \
            --build-arg NEXT_PUBLIC_TRAKT_CLIENT_ID="$GH_TRAKT_CLIENT_ID" \
            -t the-show-verse:latest \
            -t the-show-verse:$(git rev-parse --short HEAD) \
            /nas-deploy/app/
          echo "✓ Build completado: the-show-verse:$(git rev-parse --short HEAD)"

      - name: Reiniciar contenedor con la nueva imagen
        run: |
          has_tmdb_key() {
            grep -Eq '^(TMDB_API_KEY|NEXT_PUBLIC_TMDB_API_KEY)=.+' "$1" 2>/dev/null
          }

          # Buscar el archivo .env original en el NAS. No basta con que exista:
          # /nas-deploy/app/.env pudo quedar vacío por un deploy anterior.
          ENV_PATH=""
          for candidate in \
            /nas-deploy/.env \
            /nas-deploy/app/.env \
            /volume1/docker/the-show-verse/.env \
            /data/docker/the-show-verse/.env \
            /home/pablo/the-show-verse/.env
          do
            if [ -f "$candidate" ] && has_tmdb_key "$candidate"; then
              ENV_PATH="$candidate"
              break
            fi
          done

          if [ -z "$ENV_PATH" ]; then
            ENV_PATH=$(find /nas-deploy /volume1/docker/the-show-verse /data/docker/the-show-verse /home/pablo/the-show-verse -maxdepth 3 -name ".env" -type f 2>/dev/null | while read -r file; do
              if has_tmdb_key "$file"; then
                echo "$file"
                break
              fi
            done)
          fi
          
          if [ -n "$ENV_PATH" ]; then
            echo "✅ Archivo .env encontrado en: $ENV_PATH"
            if [ "$ENV_PATH" != "/nas-deploy/app/.env" ]; then
              cp "$ENV_PATH" /nas-deploy/app/.env
            fi
          else
            echo "⚠️ No se encontró archivo .env en el servidor. Se intentará completar con GitHub Secrets."
            touch /nas-deploy/app/.env
          fi

          # Garantizar variables core en runtime. El build usa NEXT_PUBLIC_*, pero
          # las rutas server de Next leen process.env dentro del contenedor.
          set_key() {
            key="$1"
            value="$2"
            if [ -n "$value" ]; then
              grep -v "^${key}=" /nas-deploy/app/.env > /nas-deploy/app/.env.tmp || true
              mv /nas-deploy/app/.env.tmp /nas-deploy/app/.env
              printf '%s=%s\n' "$key" "$value" >> /nas-deploy/app/.env
            fi
          }

          set_key NEXT_PUBLIC_APP_URL "https://theshowverse.com"
          set_key NEXT_PUBLIC_TMDB_API_KEY "$GH_TMDB_API_KEY"
          set_key TMDB_API_KEY "$GH_TMDB_API_KEY"
          set_key NEXT_PUBLIC_TRAKT_CLIENT_ID "$GH_TRAKT_CLIENT_ID"
          set_key TRAKT_CLIENT_ID "$GH_TRAKT_CLIENT_ID"
          if ! grep -q "^TRAKT_CLIENT_ID=." /nas-deploy/app/.env; then
            set_key TRAKT_CLIENT_ID "$GH_TRAKT_CLIENT_ID"
          fi
          set_key TRAKT_CLIENT_SECRET "$GH_TRAKT_CLIENT_SECRET"

          echo "Variables runtime detectadas:"
          for key in NEXT_PUBLIC_TMDB_API_KEY TMDB_API_KEY NEXT_PUBLIC_TRAKT_CLIENT_ID TRAKT_CLIENT_ID TRAKT_CLIENT_SECRET; do
            if grep -q "^${key}=." /nas-deploy/app/.env; then
              echo "✅ $key"
            else
              echo "❌ Falta $key"
            fi
          done

          if ! grep -q "^NEXT_PUBLIC_TMDB_API_KEY=." /nas-deploy/app/.env && ! grep -q "^TMDB_API_KEY=." /nas-deploy/app/.env; then
            echo "❌ Falta TMDB_API_KEY/NEXT_PUBLIC_TMDB_API_KEY en runtime. Sin esto la app queda sin contenido."
            echo "Archivos .env encontrados para diagnóstico:"
            find /nas-deploy /volume1/docker/the-show-verse /data/docker/the-show-verse /home/pablo/the-show-verse -maxdepth 3 -name ".env" -type f 2>/dev/null | while read -r file; do
              keys=$(grep -E '^(TMDB_API_KEY|NEXT_PUBLIC_TMDB_API_KEY|TRAKT_CLIENT_ID|NEXT_PUBLIC_TRAKT_CLIENT_ID|TRAKT_CLIENT_SECRET)=' "$file" 2>/dev/null | cut -d= -f1 | tr '\n' ' ')
              echo "- $file :: ${keys:-sin claves core}"
            done
            exit 1
          fi
          
          # Ollama no debe bloquear el arranque de la web. Si falla, la app sigue online
          # y solo se degrada la función local de IA.
          cd /nas-deploy/app && docker compose -f docker-compose.yml \
            --project-name the-show-verse up -d ollama || true

          cd /nas-deploy/app && docker compose -f docker-compose.yml \
            --project-name the-show-verse up -d --no-deps --force-recreate app
          echo "✓ Desplegado: $(date '+%Y-%m-%d %H:%M:%S')"
        env:
          GH_TMDB_API_KEY: ${{ secrets.TMDB_API_KEY || secrets.NEXT_PUBLIC_TMDB_API_KEY }}
          GH_TRAKT_CLIENT_ID: ${{ secrets.TRAKT_CLIENT_ID || secrets.NEXT_PUBLIC_TRAKT_CLIENT_ID }}
          GH_TRAKT_CLIENT_SECRET: ${{ secrets.TRAKT_CLIENT_SECRET }}

      - name: Verificar que el contenedor está corriendo
        run: |
          echo "Comprobando salud interna del contenedor..."
          for attempt in $(seq 1 120); do
            if docker exec the-show-verse wget -qO- http://127.0.0.1:3000/api/health >/dev/null 2>&1; then
              echo "✅ App online dentro del contenedor"
              docker exec the-show-verse wget -qO- http://127.0.0.1:3000/api/health || true
              docker ps --filter name=the-show-verse --format '{{.Names}}: {{.Status}}'
              docker port the-show-verse || true
              if curl -fsS http://127.0.0.1:3000/api/health >/dev/null 2>&1 || wget -qO- http://127.0.0.1:3000/api/health >/dev/null 2>&1; then
                echo "✅ Puerto publicado 3000 accesible desde este runner"
              else
                echo "ℹ️ El runner no puede acceder a 127.0.0.1:3000; se valida por docker exec porque la app está sana dentro del contenedor."
              fi
              exit 0
            fi
            echo "Esperando arranque de la app... intento $attempt/120"
            sleep 2
          done

          echo "❌ La app no respondió dentro del contenedor en /api/health"
          docker ps --filter name=the-show-verse --format '{{.Names}}: {{.Status}}'
          docker port the-show-verse || true
          docker exec the-show-verse wget -qO- http://127.0.0.1:3000/api/health || true
          docker inspect the-show-verse --format '{{json .State}}' || true
          docker inspect the-show-verse --format '{{json .NetworkSettings.Ports}}' || true
          docker logs the-show-verse --tail 80 || true
          exit 1

      - name: Limpiar imágenes antiguas
        run: |
          docker image prune -f || true
          echo "✓ Limpieza completada"
