name: Deploy to NAS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, nas-showverse]
    timeout-minutes: 30

    steps:
      - name: Checkout código (rama main, último commit)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Mostrar commit desplegado
        run: |
          echo "📦 Commit: $(git rev-parse --short HEAD)"
          echo "📝 Mensaje: $(git log -1 --pretty=%s)"
          echo "🕐 Fecha: $(git log -1 --pretty=%ci)"

      - name: Sincronizar archivos al directorio de la app
        run: |
          which rsync || apt-get install -y rsync -qq
          rsync -a --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.env*' \
            --exclude='*.log' \
            "$GITHUB_WORKSPACE/" /nas-deploy/app/
          echo "✓ Archivos sincronizados: $(git rev-parse --short HEAD)"

      - name: Build imagen Docker desde el código actualizado
        run: |
          docker build \
            --no-cache \
            --build-arg NEXT_PUBLIC_APP_URL="https://theshowverse.com" \
            --build-arg NEXT_PUBLIC_TMDB_API_KEY="${{ secrets.NEXT_PUBLIC_TMDB_API_KEY }}" \
            --build-arg NEXT_PUBLIC_TRAKT_CLIENT_ID="${{ secrets.NEXT_PUBLIC_TRAKT_CLIENT_ID }}" \
            -t the-show-verse:latest \
            -t the-show-verse:$(git rev-parse --short HEAD) \
            /nas-deploy/app/
          echo "✓ Build completado: the-show-verse:$(git rev-parse --short HEAD)"

      - name: Reiniciar contenedor con la nueva imagen
        run: |
          # Buscar el archivo .env original en el NAS (suele estar en /nas-deploy o /volume1/docker)
          ENV_PATH=$(find /nas-deploy /volume1/docker/the-show-verse /data/docker/the-show-verse /home/pablo/the-show-verse -maxdepth 2 -name ".env" -type f 2>/dev/null | head -n 1)
          
          if [ -n "$ENV_PATH" ]; then
            echo "✅ Archivo .env encontrado en: $ENV_PATH"
            if [ "$ENV_PATH" != "/nas-deploy/app/.env" ]; then
              cp "$ENV_PATH" /nas-deploy/app/.env
            fi
          else
            echo "⚠️ No se encontró archivo .env en el servidor. Creando uno vacío para evitar fallo de docker compose."
            touch /nas-deploy/app/.env
          fi
          
          # Ollama no debe bloquear el arranque de la web. Si falla, la app sigue online
          # y solo se degrada la función local de IA.
          cd /nas-deploy/app && docker compose -f docker-compose.yml \
            --project-name the-show-verse up -d ollama || true

          cd /nas-deploy/app && docker compose -f docker-compose.yml \
            --project-name the-show-verse up -d --no-deps --force-recreate app
          echo "✓ Desplegado: $(date '+%Y-%m-%d %H:%M:%S')"

      - name: Verificar que el contenedor está corriendo
        run: |
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3000/api/health >/dev/null 2>&1 || wget -qO- http://127.0.0.1:3000/api/health >/dev/null 2>&1; then
              echo "✅ Contenedor online y healthcheck OK"
              docker ps --filter name=the-show-verse --format '{{.Names}}: {{.Status}}'
              exit 0
            fi
            echo "Esperando healthcheck... intento $attempt/30"
            sleep 2
          done

          echo "❌ La app no respondió en /api/health"
          docker ps --filter name=the-show-verse --format '{{.Names}}: {{.Status}}'
          docker inspect the-show-verse --format '{{json .State}}' || true
          docker logs the-show-verse --tail 80 || true
          exit 1

      - name: Limpiar imágenes antiguas
        run: |
          docker image prune -f || true
          echo "✓ Limpieza completada"
